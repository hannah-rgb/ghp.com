<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Test Canvas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Grid overlay for p5.js alignment -->
    <div class="grid-columns">
      <div></div><div></div><div></div><div></div>
      <div></div><div></div><div></div><div></div>
    </div>

    <!-- p5.js Canvas container -->
    <div id="welcomeSection"></div>


    <script src="welcome.js"></script>
    <div id="mouseLine"></div>
    <script>
  // Select the INDEX element
  const indexElement = document.getElementById('nav-index');

  // Add event listener to toggle dropdown visibility on click
  indexElement.addEventListener('click', function (event) {
    // Prevent click event from bubbling up and triggering other event listeners
    event.stopPropagation();

    // Toggle the 'clicked' class on INDEX
    indexElement.classList.toggle('clicked');
  });

  // Optionally, to prevent the dropdown from disappearing on clicking elsewhere
  document.addEventListener('click', function (event) {
    // If the click is outside the INDEX menu, hide the dropdown and reset the color
    if (!indexElement.contains(event.target)) {
      indexElement.classList.remove('clicked');
    }
  });
</script>
  </body>
</html>
